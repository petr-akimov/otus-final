apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow
  namespace: otus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-role
  namespace: otus
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-rolebinding
  namespace: otus
subjects:
- kind: ServiceAccount
  name: airflow
  namespace: otus
roleRef:
  kind: Role
  name: airflow-role
  apiGroup: rbac.authorization.k8s.io