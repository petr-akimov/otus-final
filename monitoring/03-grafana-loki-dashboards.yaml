apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-logs-overview.json: |-
    {
      "title": "Loki Logs Overview",
      "uid": "loki-logs",
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "Logs per Namespace (last 1h)",
          "type": "table",
          "datasource": "Loki",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum by (namespace) (count_over_time({namespace!=\"\"}[1h]))",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {
            "showHeader": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            }
          }
        },
        {
          "id": 2,
          "title": "Log Volume by Namespace",
          "type": "timeseries",
          "datasource": "Loki",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum by (namespace) (rate({namespace!=\"\"}[1m]))",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            }
          }
        },
        {
          "id": 3,
          "title": "Recent Logs (last 15m)",
          "type": "logs",
          "datasource": "Loki",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "{namespace=\"otus\"} |~ \".*\"",
              "legendFormat": "logs"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "wrapLogs": true
          }
        },
        {
          "id": 4,
          "title": "Logs Query with Filters (namespace, pod, container)",
          "type": "logs",
          "datasource": "Loki",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 20},
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"}",
              "legendFormat": "logs"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "wrapLogs": true
          }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(namespace)",
            "refresh": 1,
            "includeAll": true,
            "multi": false,
            "current": {"value": "otus", "text": "otus"}
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(pod)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "current": {"value": "__all", "text": "All"}
          },
          {
            "name": "container",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(container)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "current": {"value": "__all", "text": "All"}
          }
        ]
      }
    }