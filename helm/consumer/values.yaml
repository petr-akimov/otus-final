replicaCount: 4

image:
  tag: latest  

kafka:
  broker: kafka:9092
  inputTopic: input
  outputTopic: predictions

consumer:
  driftThreshold: 0.5
  bufferSize: 500
  driftQuorum: 4
  voteTtl: 300
  triggerTtl: 600

airflow:
  url: http://airflow:8080/api/v1/dags/model_training/dagRuns

s3:
  endpoint: http://minio:9000
  accessKey: minio
  secretKey: minio123

dataset: a.csv

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 400m
    memory: 768Mi